<section id="ops-pilot-window" class="ops-pilot-window">
    <div class="ops-pilot-shell">
        <header class="ops-pilot-shell-header">
            <div>
                <p class="ops-pilot-shell-kicker">Standalone Agent</p>
                <h2 id="ops-pilot-shell-title">D5 Command Agent</h2>
            </div>
            <button type="button" class="ops-pilot-close" onclick="closeOpsPilot()">Close</button>
        </header>

        <div class="ops-pilot-layout">
            <aside class="ops-pilot-sidebar">
                <div class="ops-pilot-sidebar-block">
                    <label class="ops-pilot-label" for="ops-pilot-command">Command</label>
                    <div class="ops-pilot-command-row">
                        <input id="ops-pilot-command" class="ops-pilot-command-input" type="text" placeholder="all leads" />
                        <button type="button" class="btn btn-primary" onclick="submitOpsPilotCommand()">Run</button>
                    </div>
                    <p id="ops-pilot-status" class="ops-pilot-status">Ready.</p>
                </div>

                <div class="ops-pilot-sidebar-block">
                    <p class="ops-pilot-label">Objects</p>
                    <div id="ops-pilot-object-buttons" class="ops-pilot-object-buttons"></div>
                </div>

                <div class="ops-pilot-sidebar-block">
                    <p class="ops-pilot-label">Quick Prompts</p>
                    <div id="ops-pilot-prompt-list" class="ops-pilot-prompt-list"></div>
                </div>
            </aside>

            <main id="ops-pilot-main" class="ops-pilot-main">
                <section id="ops-pilot-transcript" class="ops-pilot-transcript">
                    <article class="agent-paste-card">
                        <p class="agent-paste-eyebrow">Workspace</p>
                        <h3>Ask for any object</h3>
                        <p>Create, list, open, or edit Leads, Contacts, Opportunities, Assets, Products, Brands, and Models.</p>
                    </article>
                </section>

                <section id="ops-pilot-workspace" class="ops-pilot-workspace">
                    <iframe
                        id="ops-pilot-frame"
                        class="ops-pilot-frame"
                        title="D5 Command Agent Workspace"
                        src="about:blank"
                        loading="lazy"
                        scrolling="auto"></iframe>
                </section>
            </main>
        </div>
    </div>
</section>
