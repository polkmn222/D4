<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Gem - Automotive CRM Assistant</title>
    <link rel="stylesheet" href="/agent-gem/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="agent-container">
        <header class="agent-header">
            <div class="header-left">
                <i class="fas fa-gem gem-icon"></i>
                <h1>Agent Gem</h1>
            </div>
            <div class="header-right">
                <button id="reset-btn" title="Reset Conversation"><i class="fas fa-undo"></i></button>
            </div>
        </header>

        <main id="chat-window" class="chat-window">
            <div class="message agent-message">
                <div class="message-content">
                    Hello! I'm **Agent Gem**. How can I help you today?
                    <div class="quick-actions">
                        <button class="quick-btn" onclick="sendQuery('Show all leads')">All Leads</button>
                        <button class="quick-btn" onclick="sendQuery('Show all contacts')">All Contacts</button>
                        <button class="quick-btn" onclick="sendQuery('Show all opportunities')">All Opportunities</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="agent-footer">
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off">
                <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </footer>
    </div>

    <script src="/agent-gem/static/js/agent.js"></script>
</body>
</html>
