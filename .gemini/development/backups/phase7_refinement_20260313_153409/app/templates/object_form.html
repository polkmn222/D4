<div class="sf-modal-header">
    <h2 style="font-size: 1.1rem; font-weight: 700;">New {{ object_type }} {% if record_type %}({{ record_type }}){% endif %}</h2>
    <span style="cursor: pointer;" onclick="closeModal()">✕</span>
</div>
<form action="/{{ object_type|lower }}s" method="POST">
    <div class="sf-modal-body">
        <div style="display: grid; gap: 1rem;">
            {% if record_type %}
            <input type="hidden" name="record_type" value="{{ record_type }}">
            {% endif %}
            {% for field in fields %}
            <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                <label style="font-size: 0.75rem; color: var(--text-label);">{{ field.replace('_', ' ')|capitalize }}</label>
                {% if field == 'account_id' %}
                <select name="account_id" class="btn" style="text-align: left;">
                    {% for acc in accounts %}
                    <option value="{{ acc.id }}">{{ acc.name }}</option>
                    {% endfor %}
                </select>
                {% elif field == 'contact_id' %}
                <select name="contact_id" class="btn" style="text-align: left;">
                    {% for contact in contacts %}
                    <option value="{{ contact.id }}">{{ contact.first_name }} {{ contact.last_name }}</option>
                    {% endfor %}
                </select>
                {% elif field == 'stage' %}
                <select name="stage" class="btn" style="text-align: left;">
                    <option>Prospecting</option>
                    <option>Qualification</option>
                    <option>Needs Analysis</option>
                    <option>Value Proposition</option>
                    <option>Closed Won</option>
                    <option>Closed Lost</option>
                </select>
                {% else %}
                <input type="text" name="{{ field }}" class="btn" style="text-align: left;">
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
    <div class="sf-modal-footer">
        <button type="button" class="btn" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
    </div>
</form>
