services:
  - type: web
    name: d4-app
    runtime: python
    rootDir: development
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn web.backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        sync: false
      - key: MESSAGE_PROVIDER
        sync: false
      - key: RELAY_MESSAGE_TOKEN
        sync: false
      - key: RELAY_TARGET_PROVIDER
        sync: false
      - key: SUREM_USER_CODE
        sync: false
      - key: SUREM_SECRET_KEY
        sync: false
      - key: SUREM_REQ_PHONE
        sync: false
      - key: SUREM_FORCE_TO_NUMBER
        sync: false
      - key: SUREM_AUTH_URL
        sync: false
      - key: SUREM_SMS_URL
        sync: false
      - key: SUREM_MMS_URL
        sync: false
      - key: SUREM_IMAGE_URL
        sync: false
      - key: SLACK_MESSAGE_WEBHOOK_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UNSIGNED_UPLOAD_PRESET
        sync: false
      - key: APP_BASE_URL
        sync: false
